// Central Architecture Diagram (SVG)
function ArchDiagram(){
  const [hov,setHov]=useState(null);
  const W=800,H=520,CX=400,CY=260;
  const R1=115,R2=220;

  const procPos=PROCESSES.map((_,i)=>{
    const a=(-Math.PI/2)+(2*Math.PI*i/7);
    return {x:CX+R1*Math.cos(a),y:CY+R1*Math.sin(a)};
  });
  const famPos=FAMILIES.map((_,i)=>{
    const a=(-Math.PI/2)+(2*Math.PI*i/5);
    return {x:CX+R2*Math.cos(a),y:CY+R2*Math.sin(a)};
  });

  return(

        <defs>
          <radialGradient id="gCenter" cx="50%" cy="50%" r="50%">

            <stop offset="100%" stopColor="rgba(59,130,246,0)"/>

          <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <circle cx={CX} cy={CY} r="180" fill="url(#gCenter)" opacity=".4"/>

        {/* Lines fam→proc */}
        {FAMILIES.map((f,fi)=>PROCESSES.map((p,pi)=>(

        ))}

        {/* Lines proc→fam */}
        {procPos.map((pp,pi)=>famPos.map((fp,fi)=>(

            stroke={PROCESSES[pi].color} strokeWidth="0.8" opacity={hov===`p${pi}` || hov===`f${fi}` ? .5 : .08}
            style={{transition:'opacity .2s'}}/>
        )))}

        {/* Process nodes */}
        {PROCESSES.map((p,i)=>(

              strokeWidth={hov===`p${i}`?2:1.5} style={{transition:'all .2s'}} filter="url(#glow)"/>
            <text textAnchor="middle" dy=".4em" fontSize="13" fontWeight="700" fill={p.color}>
              {p.id}

            <text textAnchor="middle" dy="44" fontSize="9.5" fontWeight="600"

        {/* Family nodes */}
        {FAMILIES.map((f,i)=>(
          <g key={f.id} transform={`translate(${famPos[i].x},${famPos[i].y})`}
            onMouseEnter={()=>setHov(`f${i}`)} onMouseLeave={()=>setHov(null)}

              stroke={f.color} strokeWidth={hov===`f${i}`?2:1}
              style={{transition:'all .2s'}} filter="url(#glow)"/>
            <text textAnchor="middle" dy=".35em" fontSize="9.5" fontWeight="700" fill={f.color}
              style={{textTransform:'uppercase',letterSpacing:.4}}>
              {f.short}
            </text>
          </g>
        ))}

        {/* Center node */}
        <g transform={`translate(${CX},${CY})`}>
          <circle r="52" fill="rgba(15,29,46,.95)" stroke="rgba(59,130,246,.7)" strokeWidth="2.5" filter="url(#glow)"/>
          <circle r="48" fill="rgba(30,63,125,.25)" stroke="rgba(59,130,246,.3)" strokeWidth="1"/>
          <text textAnchor="middle" dy="-6" fontSize="13" fontWeight="900" fill="#93C5FD" letterSpacing="1">LOGIRD</text>
          <text textAnchor="middle" dy="10" fontSize="8.5" fill="rgba(147,197,253,.6)" letterSpacing="1">7 PROCESOS</text>
          <text textAnchor="middle" dy="22" fontSize="8.5" fill="rgba(147,197,253,.6)" letterSpacing="1">5 FAMILIAS</text>
        </g>

        {/* Legend top */}
        <text x="20" y="22" fontSize="9" fill="rgba(232,237,242,.35)" fontWeight="600" letterSpacing="1.5" textTransform="uppercase">CÍRCULO INTERNO: 7 PROCESOS LOGIRD</text>
        <text x="20" y="36" fontSize="9" fill="rgba(232,237,242,.25)" letterSpacing="1.5">CÍRCULO EXTERNO: 5 FAMILIAS DE INSTRUMENTOS</text>
      </svg>

      {/* Process legend */}

        {PROCESSES.map(p=>(
          <div key={p.id} style={{display:'flex',alignItems:'center',gap:6,padding:'4px 10px',

  );

function hexToRgb(hex){
  const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return r?`${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}`:'0,0,0';
}

    </div>
  );
}
